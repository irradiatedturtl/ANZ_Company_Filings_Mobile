<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SM Mobile" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>SM Mobile</title>
  </head>
  <body>
    <div id="app" class="shell">
      <header class="header">
        <div class="header-row">
          <input
            id="ticker-input"
            class="ticker-input"
            type="text"
            inputmode="text"
            autocapitalize="characters"
            autocomplete="off"
            spellcheck="false"
            placeholder="Ticker"
            maxlength="16"
          />
          <div class="market-toggle" role="group" aria-label="Market">
            <button type="button" class="market-btn active" data-market="asx">ASX</button>
            <button type="button" class="market-btn" data-market="nzx">NZX</button>
          </div>
          <select id="year-select" class="year-select" aria-label="Year"></select>
        </div>
        <div class="header-row header-actions">
          <button type="button" id="go-btn" class="btn btn-primary">Go</button>
          <button type="button" id="fav-btn" class="btn btn-icon" aria-label="Toggle favourite" title="Favourite">&#9734;</button>
          <button type="button" id="refresh-btn" class="btn btn-icon" aria-label="Refresh" title="Refresh">&#8635;</button>
          <button type="button" id="recents-toggle" class="btn btn-secondary">Recents</button>
        </div>
        <div id="recents-panel" class="recents-panel hidden">
          <div class="chip-section">
            <span class="chip-section-label">Favourites</span>
            <div id="favourites-list" class="chip-list"></div>
          </div>
          <div class="chip-section-divider" aria-hidden="true"></div>
          <div class="chip-section">
            <span class="chip-section-label">Recents</span>
            <div id="recents-list" class="chip-list"></div>
          </div>
        </div>
        <p id="error-msg" class="error-msg hidden" role="alert"></p>
      </header>

      <main id="main-panel" class="main-panel" tabindex="-1"></main>

      <div id="loading" class="loading hidden" aria-live="polite">
        <div class="spinner"></div>
      </div>

      <nav class="bottom-nav" aria-label="Navigation">
        <button type="button" class="nav-btn active" data-view="news">News</button>
        <button type="button" class="nav-btn" data-view="quote">Quote</button>
        <button type="button" class="nav-btn" data-view="chart">Chart</button>
        <button type="button" class="nav-btn" data-view="trades">Trades</button>
        <button type="button" class="nav-btn" data-view="today">Today</button>
      </nav>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
